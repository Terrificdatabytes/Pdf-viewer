name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      project_dir:
        description: "Android project root containing gradlew (optional auto-detect)"
        required: false
        default: ""
      gradle_task:
        description: "Gradle task for APK build"
        required: false
        default: "assembleRelease"
      release_tag:
        description: "Release tag for manual runs (defaults to apk-<run_number>)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve Android project directory
        id: project
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.project_dir }}" ]]; then
            PROJECT_DIR="${{ inputs.project_dir }}"
          else
            GRADLEW_PATH="$(find . -type f -name gradlew | head -n 1 || true)"
            if [[ -z "${GRADLEW_PATH}" ]]; then
              echo "Could not find gradlew. Set workflow_dispatch input: project_dir" >&2
              exit 1
            fi
            PROJECT_DIR="$(dirname "${GRADLEW_PATH}")"
          fi

          if [[ ! -f "${PROJECT_DIR}/gradlew" ]]; then
            echo "gradlew not found in ${PROJECT_DIR}" >&2
            exit 1
          fi

          echo "project_dir=${PROJECT_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Install JavaScript dependencies
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.project.outputs.project_dir }}"
          if [[ -f "${PROJECT_DIR}/package-lock.json" ]]; then
            npm ci --prefix "${PROJECT_DIR}"
          elif [[ -f "${PROJECT_DIR}/package.json" ]]; then
            npm install --prefix "${PROJECT_DIR}"
          else
            echo "No package.json found in ${PROJECT_DIR}; skipping npm install"
          fi

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.project.outputs.project_dir }}"
          chmod +x "${PROJECT_DIR}/gradlew"
          "${PROJECT_DIR}/gradlew" -p "${PROJECT_DIR}" "${{ inputs.gradle_task || 'assembleRelease' }}"

      - name: Locate APK files
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.project.outputs.project_dir }}"
          APK_FILES="$(find "${PROJECT_DIR}" -type f -path '*/build/outputs/apk/*/*.apk' | sort || true)"
          if [[ -z "${APK_FILES}" ]]; then
            echo "No APK files found under ${PROJECT_DIR}" >&2
            exit 1
          fi
          printf 'apk_files<<EOF\n%s\nEOF\n' "${APK_FILES}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk_files }}
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
            if [[ -z "${TAG}" ]]; then
              TAG="apk-${{ github.run_number }}"
            fi
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          files: ${{ steps.apk.outputs.apk_files }}
          generate_release_notes: true
